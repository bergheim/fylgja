name: Build Fylgja APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Generate gradle wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build debug APK
      id: build
      run: |
        set -o pipefail
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log || echo "BUILD_FAILED=1" >> $GITHUB_ENV
        if [ "$BUILD_FAILED" = "1" ]; then
          echo "::error::Build failed. See build.log artifact."
          # Print errors inline for visibility (even without log-download)
          echo "=== BUILD ERRORS (first 80 lines of errors/warnings) ==="
          grep -iE "^(e:|w:|error|fail|exception|\s*at\s+\w)" build.log | head -80
          exit 1
        fi

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fylgja-build-output
        path: |
          app/build/outputs/apk/**/*.apk
          build.log
        retention-days: 7

    - name: Commit build log on failure
      if: failure()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git fetch origin build-log || git checkout --orphan build-log
        git checkout build-log
        git rm -rf . 2>/dev/null || true
        cp "${{ github.workspace }}/build.log" ./build.log 2>/dev/null || true
        # Also copy any kotlin compiler error output
        find build -name "*.log" -exec cp {} . \; 2>/dev/null || true
        git add -f build.log *.log 2>/dev/null || true
        if ! git diff --cached --quiet; then
          git commit -m "Build failure log: run ${{ github.run_id }}"
          git push origin build-log --force
        fi
