name: Build Fylgja APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Generate gradle wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build debug APK
      id: build
      run: |
        ./gradlew assembleDebug --stacktrace --info 2>&1 | tee build.log
        echo "exit_code=$?" >> $GITHUB_OUTPUT
        cp build.log app/build/outputs/apk/debug/build.log

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fylgja-build-output
        path: |
          app/build/outputs/apk/**/*.apk
          app/build/outputs/apk/debug/build.log
        retention-days: 7

    - name: Comment on failure
      if: failure()
      run: |
        echo "::error::Build failed. Check build.log artifact for details."
        tail -100 build.log | grep -iE "error|exception|FAIL" | head -30
