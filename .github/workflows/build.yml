name: Build Fylgja APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to dist branch

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Generate gradle wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Build debug APK
      id: build
      run: |
        set -o pipefail
        ./gradlew assembleDebug 2>&1 | tee build.log || echo "BUILD_FAILED=1" >> $GITHUB_ENV
        if [ "$BUILD_FAILED" = "1" ]; then
          echo "::error::Build failed. Errors:"
          grep -iE "^e:|error|fail|\s*at\s+\w" build.log | head -80
          exit 1
        fi

    - name: Publish APK to dist branch
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
        if [ -z "$APK" ]; then
          echo "No APK found"
          exit 1
        fi
        echo "Found APK: $APK"
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check out / create dist branch
        git checkout --orphan dist-new 2>/dev/null || git checkout dist-new 2>/dev/null
        
        # Keep only APK + log
        git rm -rf . 2>/dev/null || true
        cp "$APK" fylgja-debug.apk
        cp build.log build.log 2>/dev/null || true
        
        # Write README for the dist branch
        cat > README.md <<README
        # Fylgja — APK Distribution

        This branch contains automatically-built debug APKs from the main branch.

        **To sideload:** download \`fylgja-debug.apk\` directly from this branch.
        Built on every push to main.
        README
        
        cp "$APK" fylgja-debug.apk
        
        git add -f fylgja-debug.apk build.log README.md
        if git diff --cached --quiet; then
          echo "No changes to dist"
        else
          git commit -m "Build: ${GITHUB_SHA::7} — run #${{ github.run_number }}"
          git push origin dist-new:dist --force
        fi
        echo "APK published at: https://github.com/bergheim/fylgja/blob/dist/fylgja-debug.apk"
